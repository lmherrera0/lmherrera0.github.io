<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F1ED"/>
      <stop offset="100%" style="stop-color:#E8DFD5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative left bar -->
  <rect x="0" y="0" width="8" height="630" fill="#6B4C47"/>

  <!-- Decorative top-right corner accent -->
  <rect x="1100" y="0" width="100" height="8" fill="#7A9B8E"/>

  <!-- Large decorative circle (subtle) -->
  <circle cx="980" cy="80" r="180" fill="#D4C4B9" fill-opacity="0.35"/>
  <circle cx="980" cy="80" r="120" fill="#C5847B" fill-opacity="0.15"/>

  <!-- Site label -->
  <text x="64" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#7A9B8E" letter-spacing="4" text-transform="uppercase">LMHERRERA0.GITHUB.IO</text>

  <!-- Main name -->
  <text x="64" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="bold" fill="#5C3D35">Liz Magaly</text>
  <text x="64" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="bold" fill="#6B4C47">Herrera</text>

  <!-- Divider line -->
  <rect x="64" y="375" width="120" height="3" fill="#B8785F"/>

  <!-- Tagline -->
  <text x="64" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#6B4C47" letter-spacing="1">Data &amp; AI Bridge-Builder</text>

  <!-- Sub-tagline -->
  <text x="64" y="475" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#B8785F">Practitioner · Researcher · Builder</text>

  <!-- Bottom domain stamp -->
  <text x="64" y="590" font-family="'Courier New', monospace" font-size="16" fill="#D4C4B9" letter-spacing="2">lmherrera0.github.io</text>
</svg>
